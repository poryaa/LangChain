<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Rosenxt_bot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* Page: white background, centered chat card */
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background-color: #ffffff;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #0f172a;
    }

    /* Chat container: dark card */
    .chat-wrapper {
      width: 520px;
      max-width: 100%;
      height: 780px;
      background: #050708;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 24px 70px rgba(0,0,0,0.85);
      display: flex;
      flex-direction: column;
      border: 1px solid #111827;
      color: #e5e7eb;
    }

    /* Header: black with turquoise accents */
    .chat-header {
      padding: 14px 18px;
      background: #000000;
      display: flex;
      align-items: center;
      gap: 10px;
      color: #50DCE1;
      border-bottom: 1px solid #111827;
    }

    .chat-header-avatar {
      width: 32px;
      height: 32px;
      border-radius: 999px;
      background: rgba(15,23,42,0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border: 1px solid #50DCE1;
    }

    .chat-avatar-img {
      width: 100%;
      height: 100%;
      border-radius: 999px;
      object-fit: cover;
    }

    .chat-header-text {
      display: flex;
      flex-direction: column;
    }

    .chat-header-title {
      font-weight: 600;
      font-size: 15px;
      color: #50DCE1;
    }

    .chat-header-subtitle {
      font-size: 11px;
      opacity: 0.9;
      color: #9ca3af;
    }

    /* Messages area: dark with subtle turquoise glow */
    .chat-messages {
      flex: 1;
      padding: 16px 14px 10px;
      overflow-y: auto;
      background:
        radial-gradient(circle at 0 0, #50DCE115, transparent 60%),
        radial-gradient(circle at 100% 100%, #50DCE115, transparent 60%),
        #000000;
    }

    .message-row {
      display: flex;
      margin-bottom: 10px;
    }

    .message-row.user {
      justify-content: flex-end;
    }

    .message-bubble {
      max-width: 75%;
      padding: 10px 12px;
      border-radius: 18px;
      font-size: 13px;
      line-height: 1.4;
      word-wrap: break-word;
      position: relative;
    }

    .message-row.bot .message-bubble {
      background: #1f2937;
      color: #e5e7eb;
      border-bottom-left-radius: 4px;
      border: 1px solid #111827;
    }

    .message-row.user .message-bubble {
      background: #50DCE1;
      color: #000000;
      border-bottom-right-radius: 4px;
      border: 1px solid #50DCE1;
    }

    .message-meta {
      margin-top: 2px;
      font-size: 10px;
      opacity: 0.7;
      text-align: right;
      color: #9ca3af;
    }

    /* Input area */
    .chat-input-area {
      padding: 10px 10px 12px;
      border-top: 1px solid #111827;
      background: #000000;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .chat-input {
      flex: 1;
      border-radius: 999px;
      border: 1px solid #1f2937;
      padding: 9px 14px;
      font-size: 13px;
      outline: none;
      background: #050708;
      color: #e5e7eb;
    }

    .chat-input::placeholder {
      color: #6b7280;
    }

    .chat-input:focus {
      border-color: #50DCE1;
      box-shadow: 0 0 0 1px #50DCE1;
    }

    /* Send button: solid turquoise */
    .send-button {
      border: none;
      border-radius: 999px;
      padding: 9px 14px;
      background: #50DCE1;
      color: #000000;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      box-shadow: 0 6px 18px rgba(80,220,225,0.5);
    }

    .send-button:disabled {
      opacity: 0.4;
      cursor: default;
      box-shadow: none;
    }

    .send-button:hover:not(:disabled) {
      filter: brightness(1.05);
      box-shadow: 0 8px 22px rgba(80,220,225,0.6);
    }

    .typing-indicator {
      display: none;
      font-size: 11px;
      color: #9ca3af;
      margin-left: 6px;
    }

    .typing-indicator span {
      animation: blink 1.4s infinite both;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0; }
      40% { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="chat-wrapper">
    <div class="chat-header">
      <div class="chat-header-avatar">
        <!-- avatar.png should be in: static/avatar.png -->
        <img src="{{ url_for('static', filename='avatar.png') }}"
             alt="RoWise avatar"
             class="chat-avatar-img" />
      </div>
      <div class="chat-header-text">
        <div class="chat-header-title">RoWise</div>
        <div class="chat-header-subtitle">Ask about colleagues and roles</div>
      </div>
    </div>

    <div id="messages" class="chat-messages">
      <!-- messages injected here -->
    </div>

    <div class="chat-input-area">
      <input id="question" type="text" class="chat-input"
             placeholder="Type a message..." autocomplete="off" />
      <button id="sendBtn" class="send-button">
        <span>Send</span>
        <span>➤</span>
      </button>
      <div id="typing" class="typing-indicator">
        Bot is typing<span>.</span><span>.</span><span>.</span>
      </div>
    </div>
  </div>

  <script>
    const input = document.getElementById("question");
    const sendBtn = document.getElementById("sendBtn");
    const messagesDiv = document.getElementById("messages");
    const typing = document.getElementById("typing");

    function addMessage(text, sender) {
      const row = document.createElement("div");
      row.className = "message-row " + sender;

      const bubble = document.createElement("div");
      bubble.className = "message-bubble";
      bubble.textContent = text;

      const meta = document.createElement("div");
      meta.className = "message-meta";
      const now = new Date();
      meta.textContent = now.toLocaleTimeString([], {
        hour: "2-digit",
        minute: "2-digit"
      });

      bubble.appendChild(meta);
      row.appendChild(bubble);
      messagesDiv.appendChild(row);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;

      addMessage(text, "user");
      input.value = "";
      input.focus();

      typing.style.display = "block";
      sendBtn.disabled = true;

      try {
        const response = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question: text }),
        });

        const data = await response.json();
        if (data.answer) {
          addMessage(data.answer, "bot");
        } else {
          addMessage("Error: " + (data.error || "Unknown error"), "bot");
        }
      } catch (err) {
        addMessage("Network error, please try again.", "bot");
      } finally {
        typing.style.display = "none";
        sendBtn.disabled = false;
      }
    }

    sendBtn.addEventListener("click", sendMessage);

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
  </script>
</body>
</html>
